  <style>
    /* ─── TOKENS ─── */
    :root {
      --bg-0: #070706;
      --bg-1: #0D0B09;
      --bg-2: #131108;
      --bg-3: #1A1710;
      --text:  #F0EAE0;
      --text-2: #B2A898;
      --text-3: #8E8478;
      --gold:  #C9A96B;
      --gold-l:#E4CFA0;
      --gold-d:#8A6F3A;
      --glow:  rgba(201,169,107,0.08);
      --bdr:   rgba(201,169,107,0.13);
      --bdr-m: rgba(201,169,107,0.26);
      --bdr-s: rgba(201,169,107,0.42);
      --font-h:'Cormorant', Georgia, serif;
      --font-b:'Jost', system-ui, sans-serif;
      --mw:    1240px;
      --sp:    clamp(80px,10vw,140px);
      --px:    clamp(24px,5vw,80px);
    }

    /* ─── RESET ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: var(--bg-0); color: var(--text); font-family: var(--font-b); font-weight: 400; line-height: 1.6; overflow-x: hidden; }
    h1,h2,h3,h4 { font-family: var(--font-h); font-weight: 500; line-height: 1.08; letter-spacing: -0.01em; }
    a { color: inherit; text-decoration: none; }
    ul { list-style: none; }
    img { max-width: 100%; height: auto; }

    .sr-only { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border-width:0; }

    /* ─── LAYOUT ─── */
    .container { width:100%; max-width:var(--mw); margin:0 auto; padding:0 var(--px); }

    /* ─── FOCUS ─── */
    :focus-visible { outline:2px solid var(--gold); outline-offset:3px; border-radius:2px; }

    /* ─── SCROLL REVEAL ─── */
    /* Hidden state only applies once JS has run and added .js-reveal to body */
    .js-reveal .rv  { opacity:0; transform:translateY(36px); transition:opacity .9s cubic-bezier(.16,1,.3,1), transform .9s cubic-bezier(.16,1,.3,1); }
    .js-reveal .rvl { opacity:0; transform:translateX(-36px); transition:opacity .9s cubic-bezier(.16,1,.3,1), transform .9s cubic-bezier(.16,1,.3,1); }
    .rv.on, .rvl.on { opacity:1; transform:none; }
    .rv.d1 { transition-delay:.1s; } .rv.d2 { transition-delay:.2s; } .rv.d3 { transition-delay:.3s; } .rv.d4 { transition-delay:.4s; }

    /* ─── SECTION CHROME ─── */
    .section-cap { position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,var(--bdr-m),transparent); }
    .section-label { display:inline-block; font-size:.72rem; font-weight:600; letter-spacing:.18em; text-transform:uppercase; color:var(--gold); margin-bottom:18px; }

    /* ─── BUTTONS ─── */
    .btn { display:inline-flex; align-items:center; gap:8px; padding:14px 32px; font-family:var(--font-b); font-size:.8125rem; font-weight:600; letter-spacing:.08em; text-transform:uppercase; cursor:pointer; border:none; transition:all .3s ease; position:relative; overflow:hidden; }
    .btn::after { content:''; position:absolute; top:0; left:-100%; width:100%; height:100%; background:linear-gradient(90deg,transparent,rgba(255,255,255,.16),transparent); transition:left .5s ease; }
    .btn:hover::after { left:100%; }
    .btn-gold { background:var(--gold); color:var(--bg-0); }
    .btn-gold:hover { background:var(--gold-l); }
    .btn-ghost { background:transparent; color:var(--gold); border:1px solid var(--bdr-m); }
    .btn-ghost:hover { border-color:var(--gold); background:var(--glow); }

    /* ─── FORM ─── */
    .email-row { display:flex; max-width:460px; }
    .email-row label { position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0,0,0,0); }
    .email-row input[type="email"] { flex:1; padding:15px 20px; background:rgba(255,255,255,.05); border:1px solid var(--bdr-m); border-right:none; color:var(--text); font-family:var(--font-b); font-size:.9375rem; outline:none; transition:border-color .2s; min-width:0; }
    .email-row input[type="email"]::placeholder { color:var(--text-3); }
    .email-row input[type="email"]:focus { border-color:var(--gold); }
    .form-msg { margin-top:10px; font-size:.875rem; color:var(--gold-l); min-height:18px; }
    .form-msg.err { color:#e08080; }

    /* ─── HEADER ─── */
    header { position:fixed; top:0; left:0; right:0; z-index:200; padding:18px 0; transition:background .4s, border-bottom .4s; }
    header.scrolled { background:rgba(7,7,6,.93); backdrop-filter:blur(18px); border-bottom:1px solid var(--bdr); }
    .nav-wrap { display:flex; align-items:center; justify-content:space-between; }
    .nav-logo { font-family:var(--font-h); font-size:1.5rem; font-weight:600; letter-spacing:.12em; color:var(--text); }
    .nav-links { display:flex; align-items:center; gap:36px; }
    .nav-links a { font-size:.78rem; font-weight:500; letter-spacing:.07em; text-transform:uppercase; color:var(--text-2); transition:color .2s; position:relative; }
    .nav-links a::after { content:''; position:absolute; bottom:-2px; left:0; width:0; height:1px; background:var(--gold); transition:width .3s ease; }
    .nav-links a:hover { color:var(--text); }
    .nav-links a:hover::after { width:100%; }
    .nav-cta { padding:10px 22px; font-size:.78rem; }
    .nav-hamburger { display:none; background:none; border:none; color:var(--text); cursor:pointer; padding:4px; }

    /* ─── MOBILE OVERLAY ─── */
    #mobileNav { display:none; position:fixed; inset:0; background:rgba(7,7,6,.97); z-index:199; flex-direction:column; align-items:center; justify-content:center; gap:44px; }
    #mobileNav.open { display:flex; }
    #mobileNav a { font-family:var(--font-h); font-size:2.75rem; font-weight:400; color:var(--text); transition:color .2s; }
    #mobileNav a:hover { color:var(--gold); }
    #mobileNav .mob-close { position:absolute; top:22px; right:28px; background:none; border:none; color:var(--text-3); cursor:pointer; font-size:1.5rem; padding:4px; }

    /* ─────────────── HERO ─────────────── */
    #hero { position:relative; min-height:100svh; display:flex; align-items:center; justify-content:center; overflow:hidden; padding:130px 0 100px; background: radial-gradient(ellipse at 25% 80%,rgba(201,169,107,.06) 0%,transparent 55%), radial-gradient(ellipse at 80% 15%,rgba(201,169,107,.04) 0%,transparent 50%), var(--bg-0); }
    #hero-canvas { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }
    #hero::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse at center,transparent 30%,rgba(7,7,6,.65) 100%); z-index:1; pointer-events:none; }
    #hero::after { content:''; position:absolute; bottom:0; left:0; right:0; height:180px; background:linear-gradient(to bottom,transparent,var(--bg-0)); z-index:1; pointer-events:none; }
    .hero-body { position:relative; z-index:2; text-align:center; max-width:820px; padding:0 24px; }
    .hero-eyebrow { font-size:.72rem; font-weight:600; letter-spacing:.22em; text-transform:uppercase; color:var(--gold); margin-bottom:28px; animation:fadeUp .7s .2s cubic-bezier(.16,1,.3,1) both; }
    .hero-body h1 { font-size:clamp(3.2rem,7.5vw,6.8rem); font-weight:400; color:var(--text); margin-bottom:26px; animation:fadeUp .9s .4s cubic-bezier(.16,1,.3,1) both; }
    .hero-body h1 em { font-style:italic; color:var(--gold-l); }
    .hero-sub { font-size:clamp(1rem,1.7vw,1.175rem); color:var(--text-2); font-weight:300; max-width:560px; margin:0 auto 48px; line-height:1.72; animation:fadeUp .9s .62s cubic-bezier(.16,1,.3,1) both; }
    .hero-form-wrap { animation:fadeUp .9s .82s cubic-bezier(.16,1,.3,1) both; display:flex; flex-direction:column; align-items:center; }
    .hero-form-wrap .email-row { margin:0 auto; }
    .hero-form-wrap .form-msg { text-align:center; }

    @keyframes fadeUp { from { opacity:0; transform:translateY(28px); } to { opacity:1; transform:none; } }

    /* ─────────────── HOW IT WORKS ─────────────── */
    #how-it-works { position:relative; padding:var(--sp) 0; background:var(--bg-1); }
    .hiw-head { text-align:center; margin-bottom:72px; }
    .hiw-head h2 { font-size:clamp(2.4rem,4.5vw,3.75rem); font-weight:400; }
    .hiw-head h2 em { font-style:italic; color:var(--gold-l); }
    /* Horizontal rail: CSS grid 4 cols */
    .process-rail { position:relative; display:grid; grid-template-columns:repeat(4,1fr); }
    .process-spine { position:absolute; top:28px; left:12.5%; right:12.5%; height:1px; background:var(--bdr); z-index:0; }
    .process-spine-fill { position:absolute; inset:0; width:0; background:linear-gradient(90deg,var(--gold),var(--gold-l)); transition:width 1.6s cubic-bezier(.16,1,.3,1); }
    .step { position:relative; z-index:1; padding:0 clamp(12px,2vw,28px); text-align:center; }
    .step-dot { width:56px; height:56px; border-radius:50%; border:1px solid var(--bdr-m); display:flex; align-items:center; justify-content:center; margin:0 auto 32px; background:var(--bg-1); font-family:var(--font-h); font-size:1.125rem; color:var(--gold); transition:border-color .3s, background .3s; }
    .step:hover .step-dot { border-color:var(--gold); background:var(--glow); }
    .step h3 { font-size:1.35rem; font-weight:500; margin-bottom:10px; }
    .step p { font-size:.875rem; color:var(--text-2); line-height:1.65; }

    /* ─────────────── FEATURES / SERVICES ─────────────── */
    #features { position:relative; padding:var(--sp) 0; background:var(--bg-0); }
    .feat-head { display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:56px; gap:32px; flex-wrap:wrap; }
    .feat-head h2 { font-size:clamp(2.4rem,4.5vw,3.75rem); font-weight:400; max-width:520px; }
    .feat-head p { max-width:320px; color:var(--text-2); font-size:.9375rem; line-height:1.65; text-align:right; }
    /* Editorial numbered list — structurally unique */
    .services-list { border-top:1px solid var(--bdr); }
    .svc { display:grid; grid-template-columns:72px 1fr 40px; align-items:start; gap:24px; padding:30px 0; border-bottom:1px solid var(--bdr); transition:padding .25s ease, background .25s ease; cursor:default; }
    .svc:hover { padding-left:16px; padding-right:16px; margin-left:-16px; margin-right:-16px; background:var(--glow); }
    .svc-num { font-family:var(--font-h); font-size:.9375rem; color:var(--gold); opacity:.65; padding-top:3px; }
    .svc-info h3 { font-size:1.475rem; font-weight:500; margin-bottom:8px; }
    .svc-info p { font-size:.875rem; color:var(--text-2); line-height:1.65; max-width:540px; }
    .svc-arr { color:var(--text-3); opacity:0; transition:opacity .25s, color .25s, transform .25s; padding-top:4px; }
    .svc:hover .svc-arr { opacity:1; color:var(--gold); transform:translateX(4px); }

    /* ─────────────── CALCULATOR (interactive) ─────────────── */
    #calculator { position:relative; padding:var(--sp) 0; background:var(--bg-2); }
    .calc-grid { display:grid; grid-template-columns:1fr 1fr; gap:clamp(48px,6vw,96px); align-items:center; }
    .calc-l h2 { font-size:clamp(2rem,3.8vw,3.125rem); font-weight:400; margin-bottom:14px; }
    .calc-l p { color:var(--text-2); font-size:.9375rem; line-height:1.65; margin-bottom:40px; }
    .slider-head { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:14px; }
    .slider-head span { font-size:.72rem; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:var(--text-3); }
    .slider-val { font-family:var(--font-h); font-size:1.5rem; font-weight:500; color:var(--gold) !important; }
    input[type=range] { -webkit-appearance:none; appearance:none; width:100%; height:2px; background:var(--bdr-s); outline:none; cursor:pointer; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:20px; height:20px; border-radius:50%; background:var(--gold); border:2px solid var(--bg-2); transition:transform .2s; cursor:pointer; }
    input[type=range]::-webkit-slider-thumb:hover { transform:scale(1.25); }
    input[type=range]::-moz-range-thumb { width:20px; height:20px; border-radius:50%; background:var(--gold); border:2px solid var(--bg-2); cursor:pointer; }
    .calc-metrics { display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:var(--bdr); border:1px solid var(--bdr); margin-top:36px; }
    .metric-cell { background:var(--bg-2); padding:24px 16px; text-align:center; }
    .metric-val { display:block; font-family:var(--font-h); font-size:1.875rem; font-weight:500; color:var(--gold-l); }
    .metric-lbl { display:block; font-size:.68rem; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:var(--text-3); margin-top:4px; }
    /* Bar chart visual */
    .calc-chart { border:1px solid var(--bdr); padding:24px 24px 0; position:relative; height:280px; display:flex; flex-direction:column; justify-content:flex-end; }
    .chart-bars { display:flex; gap:20px; align-items:flex-end; height:100%; padding-bottom:36px; }
    .bar-group { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%; gap:0; }
    .bar-fill { width:100%; border-radius:2px 2px 0 0; transition:height .6s cubic-bezier(.34,1.56,.64,1); min-height:4px; }
    .bar-fill.b-before { background:var(--bg-3); border:1px solid var(--bdr-m); }
    .bar-fill.b-after { background:linear-gradient(to top, var(--gold-d), var(--gold)); }
    .bar-lbl { font-size:.65rem; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--text-3); margin-top:8px; text-align:center; }
    .chart-y-axis { position:absolute; left:0; top:12px; bottom:36px; display:flex; flex-direction:column; justify-content:space-between; padding:0 8px; pointer-events:none; }
    .chart-y-axis span { font-size:.6rem; color:var(--text-3); opacity:.6; }
    .calc-note { font-size:.72rem; color:var(--text-3); opacity:.7; margin-top:10px; }
    @media (max-width:900px) { .calc-grid { grid-template-columns:1fr; } }

    /* ─────────────── TESTIMONIALS ─────────────── */
    #testimonials { position:relative; padding:var(--sp) 0; background:var(--bg-1); overflow:hidden; }
    .testi-head { text-align:center; margin-bottom:56px; }
    .testi-head h2 { font-size:clamp(2.4rem,4.5vw,3.75rem); font-weight:400; }
    /* Horizontal scroll snap carousel */
    .testi-track { display:flex; overflow:hidden; }
    .testi-card { flex:0 0 100%; display:grid; grid-template-columns:3fr 2fr; gap:clamp(40px,5vw,80px); align-items:center; padding:0 clamp(20px,5vw,60px); }
    .tq-wrap { position:relative; }
    .tq-deco { font-family:var(--font-h); font-size:10rem; line-height:.5; color:var(--gold); opacity:.12; position:absolute; top:0; left:-12px; user-select:none; pointer-events:none; }
    .testi-card blockquote { font-family:var(--font-h); font-style:italic; font-size:clamp(1.3rem,2.2vw,1.75rem); font-weight:300; color:var(--text); line-height:1.42; position:relative; z-index:1; }
    .testi-card blockquote strong { font-style:normal; color:var(--gold-l); }
    .ta-block { display:flex; flex-direction:column; gap:16px; }
    .ta-divider { width:36px; height:1px; background:var(--bdr-s); }
    .ta-name { font-family:var(--font-h); font-size:1.3rem; font-weight:500; }
    .ta-role { font-size:.8125rem; color:var(--text-3); letter-spacing:.04em; }
    .ta-stars { display:flex; gap:3px; color:var(--gold); }
    .testi-nav { display:flex; align-items:center; justify-content:center; gap:20px; margin-top:52px; }
    .testi-nav button { width:46px; height:46px; border:1px solid var(--bdr-m); border-radius:50%; background:transparent; color:var(--text-2); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .2s; }
    .testi-nav button:hover { border-color:var(--gold); color:var(--gold); background:var(--glow); }
    .nav-dots { display:flex; gap:8px; align-items:center; }
    .nav-dot { width:6px; height:6px; border-radius:3px; background:var(--bdr-s); transition:all .3s; cursor:pointer; border:none; }
    .nav-dot.active { width:22px; background:var(--gold); }
    @media (max-width:768px) { .testi-card { grid-template-columns:1fr; gap:32px; } }

    /* ─────────────── FAQ ─────────────── */
    #faq { position:relative; padding:var(--sp) 0; background:var(--bg-0); }
    /* Sidebar + accordion — asymmetric 2-col */
    .faq-layout { display:grid; grid-template-columns:1fr 2fr; gap:clamp(40px,6vw,96px); align-items:start; }
    .faq-aside { position:sticky; top:110px; }
    .faq-aside h2 { font-size:clamp(2.4rem,4vw,3.5rem); font-weight:400; line-height:1.06; margin-bottom:18px; }
    .faq-aside p { color:var(--text-2); font-size:.9375rem; line-height:1.65; margin-bottom:28px; }
    .faq-list { border-top:1px solid var(--bdr); }
    .faq-item { border-bottom:1px solid var(--bdr); }
    .faq-q { width:100%; background:none; border:none; text-align:left; padding:24px 0; display:flex; justify-content:space-between; align-items:center; gap:16px; cursor:pointer; color:var(--text); font-family:var(--font-h); font-size:1.2rem; font-weight:500; transition:color .2s; }
    .faq-q:hover { color:var(--gold-l); }
    .faq-icon { flex-shrink:0; width:28px; height:28px; border:1px solid var(--bdr-m); border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--gold); transition:transform .35s, border-color .2s; }
    .faq-item.open .faq-icon { transform:rotate(45deg); border-color:var(--gold); }
    .faq-a { max-height:0; overflow:hidden; transition:max-height .45s cubic-bezier(.16,1,.3,1); }
    .faq-a-inner { padding-bottom:24px; color:var(--text-2); font-size:.9375rem; line-height:1.72; }
    @media (max-width:900px) { .faq-layout { grid-template-columns:1fr; } .faq-aside { position:static; } }

    /* ─────────────── FINAL CTA ─────────────── */
    #cta-final { position:relative; padding:var(--sp) 0; background:var(--bg-0); text-align:center; overflow:hidden; }
    .cta-bg-word { position:absolute; font-family:var(--font-h); font-size:clamp(6rem,18vw,18rem); font-weight:700; color:rgba(201,169,107,.03); top:50%; left:50%; transform:translate(-50%,-50%); white-space:nowrap; pointer-events:none; user-select:none; letter-spacing:-.02em; }
    .cta-body { position:relative; z-index:1; max-width:640px; margin:0 auto; padding:0 24px; }
    .cta-body h2 { font-size:clamp(2.8rem,5.5vw,5.25rem); font-weight:400; color:var(--text); line-height:1.04; margin-bottom:22px; }
    .cta-body h2 em { font-style:italic; color:var(--gold-l); }
    .cta-body p { font-size:1.0625rem; color:var(--text-2); margin-bottom:44px; line-height:1.65; }
    .cta-body .email-row { margin:0 auto 0; }
    .cta-body .form-msg { text-align:center; }

    /* ─────────────── FOOTER ─────────────── */
    footer { background:var(--bg-0); border-top:1px solid var(--bdr); padding:36px 0; }
    .footer-row { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:16px; }
    .f-logo { font-family:var(--font-h); font-size:1.1rem; font-weight:600; letter-spacing:.12em; color:var(--text-3); }
    .f-links { display:flex; gap:24px; }
    .f-links a { font-size:.8rem; color:var(--text-3); transition:color .2s; }
    .f-links a:hover { color:var(--text-2); }
    .f-right { text-align:right; display:flex; flex-direction:column; gap:6px; align-items:flex-end; }
    .f-copy { font-size:.8rem; color:var(--text-3); }
    .f-credit { font-size:.72rem; color:var(--text-3); opacity:.55; }
    .f-credit a { color:inherit; }
    .f-credit a:hover { opacity:1; }
    @media (max-width:640px) { .footer-row { flex-direction:column; align-items:flex-start; } .f-right { align-items:flex-start; text-align:left; } }

    /* ─────────────── RESPONSIVE ─────────────── */
    @media (max-width:768px) {
      .nav-links, .nav-cta { display:none; }
      .nav-hamburger { display:flex; align-items:center; justify-content:center; }
      .email-row { flex-direction:column; max-width:100%; }
      .email-row input[type="email"] { border-right:1px solid var(--bdr-m); border-bottom:none; }
      .process-rail { grid-template-columns:1fr; gap:36px; }
      .process-spine { display:none; }
      .step { text-align:left; }
      .step-dot { margin:0 0 20px 0; }
      .feat-head { flex-direction:column; align-items:flex-start; }
      .feat-head p { text-align:left; }
      .svc { grid-template-columns:56px 1fr; }
      .svc-arr { display:none; }
      .calc-metrics { grid-template-columns:1fr; }
      .hero-body h1 { font-size:clamp(2.8rem,9vw,5rem); }
    }

    /* ─────────────── REDUCED MOTION ─────────────── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration:.01ms !important; transition-duration:.01ms !important; }
      .rv, .rvl { opacity:1; transform:none; }
    }
  </style>
<style>
  body.sub-page { display: flex; flex-direction: column; min-height: 100vh; }
  .sub-page-content { max-width: 48rem; margin: 6rem auto 4rem; padding: 0 2rem; flex: 1; }
  .sub-page-content h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 2rem; }
  .sub-page-content p { margin: 0 0 1.25rem; line-height: 1.8; opacity: 0.85; }
  .sub-page-content img { max-width: 100%; border-radius: 0.75rem; }
  .sub-page-content a { text-decoration: underline; text-underline-offset: 2px; }
  .sub-page-nav-link { color: inherit !important; }
</style></head>
<body class="sub-page">

<div class="sub-page-content">
<h1>Privacy Policy</h1>
<p style="opacity:0.5">No content yet.</p>
</div>
<footer>
    <div class="container footer-row">
      <span class="f-logo">SHIKOVA</span>
      <div class="f-links">
        <a href="__SITE_URL__/policy">Privacy Policy</a>
      </div>
      <div class="f-right">
        <span class="f-copy">© <span id="yr"></span> Shikova. All rights reserved.</span>
        <span class="f-credit">made with ♥ by <a href="https://kento.studio" target="_blank" rel="noopener">kento.studio</a></span>
      </div>
    </div>
  </footer>
<script>
  /* ─── YEAR ─── */
  document.getElementById('yr').textContent = new Date().getFullYear();

  /* ─── HEADER SCROLL ─── */
  const hdr = document.getElementById('site-header');
  window.addEventListener('scroll', () => hdr.classList.toggle('scrolled', window.scrollY > 40), { passive: true });

  /* ─── MOBILE NAV ─── */
  const mobileNav = document.getElementById('mobileNav');
  const menuToggle = document.getElementById('menuToggle');
  const menuClose  = document.getElementById('menuClose');
  function openMob()  { mobileNav.classList.add('open'); mobileNav.setAttribute('aria-hidden','false'); menuToggle.setAttribute('aria-expanded','true'); document.body.style.overflow='hidden'; }
  function closeMob() { mobileNav.classList.remove('open'); mobileNav.setAttribute('aria-hidden','true'); menuToggle.setAttribute('aria-expanded','false'); document.body.style.overflow=''; }
  menuToggle.addEventListener('click', openMob);
  menuClose.addEventListener('click', closeMob);
  mobileNav.querySelectorAll('a').forEach(a => a.addEventListener('click', closeMob));

  /* ─── HERO CANVAS PARTICLES ─── */
  (function() {
    const canvas = document.getElementById('hero-canvas');
    const ctx    = canvas.getContext('2d');
    let W, H;
    const mouse  = { x: -999, y: -999 };
    const N      = 55;
    const ptcls  = [];

    function resize() {
      W = canvas.width  = canvas.offsetWidth;
      H = canvas.height = canvas.offsetHeight;
    }

    class P {
      constructor() { this.spawn(); }
      spawn() {
        this.x  = Math.random() * (W||800);
        this.y  = Math.random() * (H||600);
        this.vx = (Math.random() - 0.5) * 0.28;
        this.vy = (Math.random() - 0.5) * 0.28;
        this.r  = Math.random() * 1.4 + 0.4;
        this.a  = Math.random() * 0.45 + 0.15;
      }
      tick() {
        const dx = mouse.x - this.x;
        const dy = mouse.y - this.y;
        const d  = Math.sqrt(dx*dx + dy*dy);
        if (d < 180 && d > 0) { this.vx += (dx/d)*0.018; this.vy += (dy/d)*0.018; }
        this.vx *= 0.985; this.vy *= 0.985;
        this.x  += this.vx; this.y  += this.vy;
        if (this.x < 0) this.x = W; if (this.x > W) this.x = 0;
        if (this.y < 0) this.y = H; if (this.y > H) this.y = 0;
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
        ctx.fillStyle = `rgba(201,169,107,${this.a})`;
        ctx.fill();
      }
    }

    function init() { resize(); for (let i=0; i<N; i++) ptcls.push(new P()); }

    function frame() {
      ctx.clearRect(0,0,W,H);
      for (let i=0; i<N; i++) {
        for (let j=i+1; j<N; j++) {
          const dx = ptcls[i].x - ptcls[j].x;
          const dy = ptcls[i].y - ptcls[j].y;
          const d  = Math.sqrt(dx*dx + dy*dy);
          if (d < 110) {
            ctx.beginPath();
            ctx.strokeStyle = `rgba(201,169,107,${(1-d/110)*0.14})`;
            ctx.lineWidth   = 0.5;
            ctx.moveTo(ptcls[i].x, ptcls[i].y);
            ctx.lineTo(ptcls[j].x, ptcls[j].y);
            ctx.stroke();
          }
        }
        ptcls[i].tick(); ptcls[i].draw();
      }
      requestAnimationFrame(frame);
    }

    window.addEventListener('resize', resize, { passive:true });
    document.addEventListener('mousemove', e => {
      const r = canvas.getBoundingClientRect();
      mouse.x = e.clientX - r.left; mouse.y = e.clientY - r.top;
    }, { passive:true });

    init(); frame();
  })();

  /* ─── SCROLL REVEAL ─── */
  document.body.classList.add('js-reveal');
  const revEls = document.querySelectorAll('.rv, .rvl');
  const revObs = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('on'); revObs.unobserve(e.target); } });
  }, { threshold: 0.12 });
  revEls.forEach(el => revObs.observe(el));

  /* ─── PROCESS SPINE ANIMATION ─── */
  const spineEl = document.getElementById('spineFill');
  const hiw = document.getElementById('how-it-works');
  const spineObs = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting) { spineEl.style.width = '100%'; spineObs.disconnect(); }
  }, { threshold: 0.3 });
  spineObs.observe(hiw);

  /* ─── FORM SUBMIT ─── */
  async function handleForm(form, msgEl) {
    const inp = form.querySelector('input[type="email"]');
    const btn = form.querySelector('button[type="submit"]');
    const email = inp.value.trim();
    if (!email) { inp.focus(); return; }
    btn.disabled = true;
    const orig = btn.textContent;
    btn.textContent = 'Sending…';
    msgEl.textContent = '';
    msgEl.className = 'form-msg';
    try {
      const res = await fetch('__API_URL__/api/signups', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, landingPageId: '__LANDING_PAGE_ID__' })
      });
      if (res.status === 200 || res.status === 201) {
        msgEl.textContent = 'Your seat is reserved — we'll be in touch within 24 hours.';
        inp.value = '';
      } else if (res.status === 409) {
        msgEl.textContent = 'You\'re already on our list.';
      } else { throw new Error(); }
    } catch {
      msgEl.textContent = 'Something went wrong — try again.';
      msgEl.classList.add('err');
    } finally {
      btn.disabled = false; btn.textContent = orig;
    }
  }
  document.getElementById('hero-form').addEventListener('submit', e => { e.preventDefault(); handleForm(e.currentTarget, document.getElementById('hero-msg')); });
  document.getElementById('cta-form').addEventListener('submit',  e => { e.preventDefault(); handleForm(e.currentTarget, document.getElementById('cta-msg')); });

  /* ─── GROWTH CALCULATOR ─── */
  (function() {
    const slider   = document.getElementById('budgetSlider');
    const valDisp  = document.getElementById('sliderVal');
    const revEl    = document.getElementById('calcRevenue');
    const leadEl   = document.getElementById('calcLeads');
    const roiEl    = document.getElementById('calcRoi');
    const barBef   = document.getElementById('barBefore');
    const barAft   = document.getElementById('barAfter');
    let animFrame  = null;
    const prevVals = { rev: 85000, leads: 172 };

    function getRoi(b) {
      if (b < 12000) return 2.6;
      if (b < 25000) return 3.1;
      if (b < 50000) return 4.0;
      return 4.9;
    }

    function fmt(n) { return '$' + Math.round(n).toLocaleString('en-US'); }

    function animateNum(el, from, to, formatter, dur) {
      const start = performance.now();
      function tick(now) {
        const t = Math.min((now - start) / dur, 1);
        const ease = 1 - Math.pow(1 - t, 3);
        el.textContent = formatter(from + (to - from) * ease);
        if (t < 1) animFrame = requestAnimationFrame(tick);
      }
      if (animFrame) cancelAnimationFrame(animFrame);
      requestAnimationFrame(tick);
    }

    function update(b, animate) {
      const roi = getRoi(b);
      const rev  = b * roi;
      const leads = Math.round(b / 145);
      valDisp.textContent = '$' + b.toLocaleString('en-US');
      if (animate) {
        animateNum(revEl,  prevVals.rev,   rev,   fmt, 520);
        animateNum(leadEl, prevVals.leads, leads, v => Math.round(v).toLocaleString('en-US'), 520);
      } else {
        revEl.textContent  = fmt(rev);
        leadEl.textContent = leads.toLocaleString('en-US');
      }
      prevVals.rev   = rev;
      prevVals.leads = leads;
      roiEl.textContent  = roi.toFixed(1) + 'x';
      const maxRev = 490000;
      const befPct = Math.cbrt(b / 100000) * 58;
      const aftPct = Math.cbrt(rev / maxRev) * 96;
      barBef.style.height = befPct + '%';
      barAft.style.height = aftPct + '%';
    }

    slider.addEventListener('input', () => update(parseInt(slider.value), true));
    update(25000, false);
  })();

  /* ─── TESTIMONIALS CAROUSEL ─── */
  (function() {
    const track = document.getElementById('testiTrack');
    const cards = track.querySelectorAll('.testi-card');
    const dots  = document.querySelectorAll('.nav-dot');
    let cur = 0, isAnimating = false;

    function go(n) {
      if (isAnimating) return;
      isAnimating = true;
      cur = ((n % cards.length) + cards.length) % cards.length;
      track.style.transform = `translateX(-${cur * 100}%)`;
      track.style.transition = 'transform .55s cubic-bezier(.16,1,.3,1)';
      dots.forEach((d,i) => {
        d.classList.toggle('active', i===cur);
        d.setAttribute('aria-selected', i===cur ? 'true' : 'false');
      });
      setTimeout(() => { isAnimating = false; }, 580);
    }

    // Make track a flex container with no overflow (transform-based)
    track.style.display = 'flex';
    track.style.overflow = 'hidden';
    track.style.willChange = 'transform';

    document.getElementById('testiPrev').addEventListener('click', () => go(cur-1));
    document.getElementById('testiNext').addEventListener('click', () => go(cur+1));
    dots.forEach((d,i) => d.addEventListener('click', () => go(i)));

    // Keyboard
    track.parentElement.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft') go(cur-1);
      if (e.key === 'ArrowRight') go(cur+1);
    });
  })();

  /* ─── FAQ ACCORDION ─── */
  document.querySelectorAll('.faq-q').forEach(btn => {
    btn.addEventListener('click', () => {
      const item = btn.closest('.faq-item');
      const ans  = item.querySelector('.faq-a');
      const inner = item.querySelector('.faq-a-inner');
      const isOpen = item.classList.contains('open');
      // close all
      document.querySelectorAll('.faq-item.open').forEach(el => {
        el.classList.remove('open');
        el.querySelector('.faq-a').style.maxHeight = '0';
        el.querySelector('.faq-q').setAttribute('aria-expanded','false');
      });
      if (!isOpen) {
        item.classList.add('open');
        ans.style.maxHeight = inner.scrollHeight + 'px';
        btn.setAttribute('aria-expanded','true');
      }
    });
  });

  /* ─── ICONS INIT ─── */
  function initIcons() { if (typeof lucide !== 'undefined') lucide.createIcons(); }
  </script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js" onload="initIcons()"></script>
</body>
